<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bintang</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<div id="app-header">
    <div id="header-left">
        <span id="header-title">Bintang Court Manager</span>
        <span id="header-sub">Bintang Logins · Turso</span>
    </div>
    <div id="header-right">
        <button class="btn" onclick="clearAllCourts()">Clear all</button>
        <button class="btn btn-primary" onclick="addCourt()">+ Add court</button>
    </div>
</div>

<div id="tab-bar">
    <button class="tab-btn tab-active" onclick="switchTab('courts')">Courts</button>
    <button class="tab-btn" onclick="switchTab('roster')">Roster</button>
</div>

<div id="main-layout">

    <div id="courts-area">
        <div id="courts-grid">
            <!-- courts rendered here by JS -->
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-card">
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-label">Players</div>
                    <div class="stat-val" id="stat-players">—</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Queued</div>
                    <div class="stat-val" id="stat-queued">—</div>
                </div>
            </div>
        </div>

        <div class="sidebar-card" id="roster-card">
            <div class="sidebar-header">
                <span>Roster</span>
                <span id="roster-count" class="muted-text">0 players</span>
            </div>
            <div class="search-wrap">
                <input type="text" id="roster-search" placeholder="Search players…" oninput="filterRoster()">
            </div>
            <div id="item-list">
                <!-- roster rows rendered here by JS -->
            </div>
        </div>
    </div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="index.js"></script>
<script>
    function switchTab(tab) {
        const courts = document.getElementById('courts-area');
        const sidebar = document.getElementById('sidebar');
        const btns = document.querySelectorAll('.tab-btn');
        if (tab === 'courts') {
            courts.style.display = '';
            sidebar.style.display = 'none';
            btns[0].classList.add('tab-active');
            btns[1].classList.remove('tab-active');
        } else {
            courts.style.display = 'none';
            sidebar.style.display = '';
            btns[0].classList.remove('tab-active');
            btns[1].classList.add('tab-active');
        }
    }
</script>
</body>
</html>
